name: mobile
description: "중고거래 MVP — Flutter mobile app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 네트워크
  dio: ^5.7.0

  # 인증
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1

  # 라우팅
  go_router: ^14.3.0

  # 이미지 선택 & 압축 (Story 3.2)
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # FCM 푸시 알림 (Story 4.5)
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
